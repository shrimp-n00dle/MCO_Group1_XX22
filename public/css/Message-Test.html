<!DOCTYPE html>
<head>
    <title>CSS Examples</title>
    <link rel="stylesheet" href="garnet_stylesheet.css">
</head>

<body>
<div class="navBar">
    <img src="../img/Garnet_Logo.png" class="navLogo"> 
    <h1 class="navHeader"> messaging </h1>
    <ul class="navList">
        <li class="navListItem"><a href="/home">Home</a></li>
        <li class="navListItem"><a href="/viewProfile/Si-Szas">View Profile</a></li>
        <li class="navListItem"><a href="/welcome">Log Out</a></li>
    </ul>
</div>
<div style="display:flex">
    <!-- Message Body -->
    <div class="sidebar-full">
        <ul>
            <a href="" class="preview">
                <li class="messagePreview">
                    <h4 class="messageUser">Si-Szas</h4>
                    <p  class="lastMessage"> You sent: Hey!</p>
                </li>
            </a>
            <a href="" class="preview">
                <li class="messagePreview">
                    <h4 class="messageUser">Ayze</h4>
                    <p  class="lastMessage"> Ayze sent: :3</p>
                </li>
            </a>
            <a href="" class="preview">
                <li class="messagePreview">
                    <h4 class="messageUser">JAN-VINGNO</h4>
                    <p  class="lastMessage"> You sent: Dude did you see the new game theory vid</p>
                </li>
            </a>
        </ul>
    </div>

    <div class="currentMessageThreadContainer">
        <h2 class="messageThreadHeader">Name</h2>
        <div class="messageThread">
            <p class="messageThreadLeft">Hey there :)</p>
            <p class="messageThreadRight">Hey!</p>
        </div>
        <div class="messageInputContainer">
            <form class="messageForm">
                <textarea class="messageNewInput"></textarea>
                <button class="sendMessage"></button>
            </form>
        </div>
    </div>

</div>
</body>
